spring.application.name=snapshot-worker
server.port=8081

spring.kafka.bootstrap-servers=localhost:9092

# Consumer
spring.kafka.consumer.group-id=snapshot-worker-group-2
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.collaborativeworkspace.snapshot_worker.dto.DocumentEditEventDto

# PostgreSQL Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/workspacedb
spring.datasource.username=root
spring.datasource.password=rootpassword

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
